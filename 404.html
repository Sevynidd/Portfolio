<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 Not Found - Alornix</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="icon" type="image/x-icon" href="favicon.ico">
</head>

<body class="bg-gray-50 h-screen flex flex-col items-center justify-center text-center px-4">
    <div class="max-w-md">
        <h1 class="text-9xl font-bold text-gray-200">404</h1>
        <h2 class="text-3xl font-bold text-gray-900 mt-[-50px]">Page Not Found</h2>
        <p class="text-gray-500 mt-4 mb-8">The page you are looking for might have been removed, had its name changed,
            or is temporarily unavailable.</p>
        <a href="index.html"
            class="inline-block bg-blue-600 text-white px-8 py-3 rounded-full font-bold hover:bg-blue-700 transition shadow-lg hover:shadow-xl transform hover:-translate-y-1">
            Back to Home
        </a>
    </div>
