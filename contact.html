<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kontakt - Karina Kock</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link rel="stylesheet" href="main.css">
</head>

<body class="bg-[#F2F2F2] text-black">
    <!-- Navigation -->
    <nav class="fixed top-0 w-full z-50 p-6 md:p-8 bg-transparent text-black transition-colors duration-300">
        <div class="flex justify-between items-center relative z-50">
            <a href="index.html"
                class="display-font text-2xl font-bold tracking-tighter hover:opacity-70 transition text-black"
                id="logo">PORTFOLIO</a>

            <!-- Mobile Menu Button -->
            <button class="md:hidden flex flex-col gap-1.5 z-50 mix-blend-difference text-white" onclick="toggleMenu()">
                <span class="w-8 h-0.5 bg-current"></span>
                <span class="w-8 h-0.5 bg-current"></span>
                <span class="w-8 h-0.5 bg-current"></span>
            </button>

            <!-- Desktop Menu -->
            <div class="hidden md:flex gap-8 text-sm font-medium tracking-wide text-black">
				<a href="about.html" class="hover:underline decoration-2 underline-offset-4">Über mich</a>
                <a href="cv.html" class="hover:underline decoration-2 underline-offset-4">Lebenslauf</a>
                <a href="contact.html" class="underline decoration-2 underline-offset-4 pointer-events-none">Kontakt</a>
            </div>
        </div>

        <!-- Mobile Menu Overlay -->
        <div id="mobile-menu"
            class="fixed inset-0 bg-black text-white flex flex-col items-center justify-center gap-8 -translate-y-full transition-transform duration-500 ease-in-out md:hidden z-40">
			<a href="about.html" class="display-font text-4xl font-bold hover:text-gray-300 transition"
                onclick="toggleMenu()">Über mich</a>
            <a href="cv.html" class="display-font text-4xl font-bold hover:text-gray-300 transition"
                onclick="toggleMenu()">Lebenslauf</a>
            <a href="contact.html" class="display-font text-4xl font-bold hover:text-gray-300 transition underline"
                onclick="toggleMenu()">Kontakt</a>
        </div>
    </nav>

    <section class="pt-40 pb-20 px-4">
        <div class="max-w-6xl mx-auto text-center">
            <h1 class="display-font text-4xl md:text-5xl font-bold mb-12">ICH KONNTE DICH ÜBERZEUGEN?</h1>

            <form class="space-y-12 text-left">
                <div class="relative group">
                    <input type="text"
                        class="w-full bg-transparent border-b-2 border-black/10 py-4 text-xl focus:outline-none focus:border-black transition"
                        placeholder=" " required>
                    <label
                        class="absolute left-0 top-4 text-gray-400 text-xl pointer-events-none transition-all group-focus-within:-top-6 group-focus-within:text-xs group-focus-within:text-black">Dein
                        Name</label>
                </div>

                <div class="relative group">
                    <input type="email"
                        class="w-full bg-transparent border-b-2 border-black/10 py-4 text-xl focus:outline-none focus:border-black transition"
                        placeholder=" " required>
                    <label
                        class="absolute left-0 top-4 text-gray-400 text-xl pointer-events-none transition-all group-focus-within:-top-6 group-focus-within:text-xs group-focus-within:text-black">Deine
                        Email</label>
                </div>

                <div class="relative group">
                    <textarea rows="1"
                        class="w-full bg-transparent border-b-2 border-black/10 py-4 text-xl focus:outline-none focus:border-black transition resize-none"
                        placeholder=" " required></textarea>
                    <label
                        class="absolute left-0 top-4 text-gray-400 text-xl pointer-events-none transition-all group-focus-within:-top-6 group-focus-within:text-xs group-focus-within:text-black">Was möchtest du mir mitteilen?</label>
                </div>

                <div class="text-center pt-8">
                    <button
                        class="inline-block border border-black px-12 py-4 text-sm font-bold uppercase tracking-widest hover:bg-black hover:text-white transition duration-500">
                        E-Mail versenden
                    </button>
                </div>
            </form>

            <div class="mt-20 flex justify-center gap-12 text-sm text-gray-500 font-medium">
                <div>
                    <p class="uppercase tracking-widest mb-2 text-black text-xs font-bold">Email</p>
                    <a href="mailto:maxmustermann@test.com" class="hover:text-black transition">maxmustermann@test.com</a>
                </div>
                <!--<div>
                    <p class="uppercase tracking-widest mb-2 text-black text-xs font-bold"></p>
                    <a href="tel:+15550000000" class="hover:text-black transition">
                        +1 (555) 000-0000</a>
                </div>-->
            </div>
        </div>
    </section>

    <footer class="py-12 border-t border-gray-300">
        <div class="container mx-auto px-4 flex justify-between items-center">
            <div class="text-xs font-bold uppercase tracking-widest">
                &copy; 2026 Karina Kock
            </div>
            <div class="flex gap-8 text-xs font-bold uppercase tracking-widest">
                <a href="https://github.com/Sevynidd" class="hover:line-through">GitHub</a>
                <a href="https://www.linkedin.com/in/karina-kock-ab272821a/" class="hover:line-through">LinkedIn</a>
            </div>
        </div>
    </footer>

    <script>
        // Input label animation fix when value exists
        const inputs = document.querySelectorAll('input, textarea');
        inputs.forEach(input => {
            input.addEventListener('input', () => {
                if (input.value) input.classList.add('has-value');
                else input.classList.remove('has-value');
            })
        });
   
        function toggleMenu() {
            const menu = document.getElementById('mobile-menu');
            menu.classList.toggle('-translate-y-full');
        }
    </script>
</body>

</html>
